<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Lignes de vitesse derrière l'avion : trois petits traits en pointillés -->
  <g stroke="#3e9a4c" stroke-width="2.4" stroke-linecap="round" opacity="0.55">
    <line x1="4"  y1="34" x2="14" y2="34"/>
    <line x1="2"  y1="42" x2="10" y2="42"/>
    <line x1="6"  y1="26" x2="13" y2="26"/>
  </g>

  <!-- Avion en papier (forme cartoon, vert basilic) -->
  <!-- Aile principale -->
  <path d="M14 34 L 60 14 L 44 38 Z" fill="#5fb764" stroke="#225f30" stroke-width="2" stroke-linejoin="round"/>
  <!-- Aile arrière repliée (volume) -->
  <path d="M14 34 L 44 38 L 30 50 Z" fill="#3e9a4c" stroke="#225f30" stroke-width="2" stroke-linejoin="round"/>
  <!-- Pli central -->
  <line x1="14" y1="34" x2="48" y2="28" stroke="#225f30" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Part de gâteau sur l'avion -->
  <!-- Base biscuit -->
  <path d="M36 12 L 50 10 L 48 22 L 34 24 Z" fill="#e8c98a" stroke="#7a4a1c" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- Crème (tomate/rose gourmand) -->
  <path d="M36 12 L 50 10 L 48.6 16 C 46 14, 42 15, 38 14 L 36 12 Z" fill="#ee3a1f" stroke="#7a4a1c" stroke-width="1.4" stroke-linejoin="round"/>
  <!-- Cerise sur le dessus -->
  <circle cx="44" cy="8.5" r="3" fill="#d72814" stroke="#7a4a1c" stroke-width="1.2"/>
  <!-- Tige de la cerise -->
  <path d="M44 6 C 45 4, 47 3, 48 4" stroke="#225f30" stroke-width="1.4" fill="none" stroke-linecap="round"/>
</svg>
