titre: Glace coco
slug: glace-coco
categorie: glace
portions: 4
temps_preparation_min: 5
temps_cuisson_min: 20
contient: []
tags: [ete, magimix]
image: glace-coco.jpg

sections:
  - ingredients:
      - nom: crème de coco
        quantite: 200
        unite: ml
        details: 1 brique
      - nom: lait de riz
        quantite: 25
        unite: cl
      - nom: coco râpée
        quantite: 50
        unite: g
      - nom: sirop d'agave
        quantite: 5
        unite: cl
        details: à ajuster selon le goût
    etapes:
      - Verser la crème de coco, le lait de riz et la coco râpée dans un saladier, mélanger.
      - Ajouter le sirop d'agave, sucrer en fonction du goût.
      - Verser la préparation dans le bol de la Magimix et sélectionner le mode "glace à l'italienne".
      - Servir quand la glace a commencé à se séparer du bord et est solide mais reste crémeuse (environ 20 minutes).

notes: Réalisée à la Magimix Gelato Expert.
