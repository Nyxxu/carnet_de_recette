titre: Filet mignon aux pommes de terre
slug: filet-mignon-pommes-de-terre
categorie: plat
portions: 4
temps_preparation_min: 15
temps_cuisson_min: 45
contient: []
tags: [familial]
image: ""

sections:
  - ingredients:
      - nom: filet mignon
        quantite: 1
        details: 500 à 700 g
      - nom: pommes de terre moyennes
        quantite: 12
        details: ou 24 petites
      - nom: herbes de Provence
      - nom: sel
      - nom: poivre
      - nom: huile de tournesol
    etapes:
      - Préchauffer le four à 180°C en chaleur tournante.
      - Dégraisser le filet mignon.
      - Éplucher les pommes de terre et couper les moyennes en deux.
      - Préparer un mélange d'herbes de Provence, sel et poivre (environ 6 à 7 cuillères à café).
      - Verser de l'huile de tournesol au fond du plat, ajouter le filet mignon et disposer les pommes de terre autour.
      - Verser 10 à 15 ml d'huile sur la viande et les pommes de terre.
      - Verser 10 ml d'eau dans le plat.
      - Parsemer le mélange d'épices sur la viande et les pommes de terre.
      - Cuire 45 minutes au four.
      - Découper le filet mignon en tranches de 1,5 cm et servir avec les pommes de terre.
