titre: Quiche oignon bacon
slug: quiche-oignon-bacon
categorie: plat
portions: 4
temps_preparation_min: 15
temps_cuisson_min: 45
contient: []
tags: [familial]
image: ""

sections:
  - ingredients:
      - nom: pâte feuilletée sans gluten
        quantite: 1
        details: marque Super U
      - nom: oeufs
        quantite: 4
      - nom: crème de coco
        quantite: 20
        unite: cl
      - nom: huile d'olive
        quantite: 5
        unite: cl
      - nom: eau
        quantite: 3
        unite: cl
      - nom: moutarde mi-forte ou forte
        quantite: 3
        unite: c. à soupe
      - nom: oignons moyens
        quantite: 2
        details: ou 1 gros oignon
      - nom: tranches de bacon
        quantite: 10
      - nom: sel
      - nom: poivre
    etapes:
      - Préchauffer le four à 180°C.
      - Placer la pâte feuilletée dans le plat à quiche et piquer le fond à la fourchette.
      - Étaler les 3 cuillères de moutarde sur le fond de la pâte.
      - Couper les oignons en deux puis en tranches fines, les disposer dans le plat.
      - Découper le bacon en dés et le placer au-dessus des oignons.
      - Mélanger dans un bol oeufs, crème de coco, huile d'olive, eau, sel et poivre, puis verser sur les garnitures.
      - Cuire au four 45 minutes.
